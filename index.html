    <script>
        // --- STATE MANAJEMEN ---
        let dbState = {
            docs: [],
            notarisList: ["Notaris Fulan, S.H., M.Kn.", "Notaris Budi, S.H."] // Default
        };
        let fileQueue = {};
        let currentSha = null;
        
        const attachmentTypes = [
            { key: 'spa', label: 'Surat Kuasa' },
            { key: 'pengantar', label: 'Pengantar' },
            { key: 'sps', label: 'Dokumen SPS' },
            { key: 'catatanHT', label: 'Catatan HT' },
            { key: 'sertifikatHT', label: 'Sertifikat HT' }
        ];

        // --- INISIALISASI ---
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            if(getGithubConfig().token) {
                document.getElementById('github-alert').classList.add('hidden');
                syncFromGithub();
            } else {
                document.getElementById('github-alert').classList.remove('hidden');
                // Data dummy untuk demo jika tidak ada token
                dbState.docs = [{ 
                    id: 1, kategori: 'Pembuatan HT', tglKirim: '2023-10-01', noSPS: 'SPS/2023/100', 
                    namaDebitur: 'Budi Santoso', noSHM: ['SHM 01', 'SHM 02'], nilai: 100000000, 
                    notaris: dbState.notarisList[0], kantah: 'BPN Kota', progress: 'Pemberkasan Awal', 
                    status: 'Aktif', files: {} 
                }];
                renderList();
            }
        });

        // --- UI & UX (Sidebar, Tabs, Toast) ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function switchTab(tabName) {
            document.getElementById('tab-dashboard').classList.add('hidden-tab');
            document.getElementById('tab-settings').classList.add('hidden-tab');
            document.getElementById(`tab-${tabName}`).classList.remove('hidden-tab');
            document.getElementById('header-title').innerText = tabName === 'dashboard' ? 'Daftar Berkas' : 'Pengaturan';
            if(window.innerWidth < 768) toggleSidebar(); // Tutup sidebar di mobile setelah klik menu
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.className = `fixed top-4 right-4 z-[200] transform transition-all duration-300 flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border ${type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : type === 'info' ? 'bg-blue-50 border-blue-200 text-blue-800' : 'bg-red-50 border-red-200 text-red-800'}`;
            document.getElementById('toast-icon').className = `ph ${type === 'success' ? 'ph-check-circle text-emerald-600' : type === 'info' ? 'ph-info text-blue-600' : 'ph-warning-circle text-red-600'} text-xl md:text-2xl`;
            setTimeout(() => toast.classList.remove('translate-y-[-100%]', 'opacity-0'), 10);
            setTimeout(() => toast.classList.add('translate-y-[-100%]', 'opacity-0'), 3000);
        }

        // --- GITHUB API ---
        function getGithubConfig() {
            return {
                username: localStorage.getItem('gh_username') || '',
                repo: localStorage.getItem('gh_repo') || '',
                token: localStorage.getItem('gh_token') || ''
            };
        }

        function loadSettings() {
            const config = getGithubConfig();
            document.getElementById('gh-username').value = config.username;
            document.getElementById('gh-repo').value = config.repo;
            document.getElementById('gh-token').value = config.token;
        }

        function saveSettings(e) {
            e.preventDefault();
            localStorage.setItem('gh_username', document.getElementById('gh-username').value.trim());
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
            localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
            document.getElementById('settings-status').innerText = "Menguji...";
            syncFromGithub().then(success => {
                document.getElementById('settings-status').innerText = success ? "Tersimpan & Terhubung!" : "Gagal terhubung!";
                if(success) {
                    document.getElementById('github-alert').classList.add('hidden');
                    setTimeout(() => switchTab('dashboard'), 1000);
                }
            });
        }

        async function syncFromGithub() {
            const config = getGithubConfig();
            if(!config.token) return false;
            document.getElementById('sync-icon')?.classList.add('animate-spin');
            
            try {
                const url = `https://api.github.com/repos/${config.username}/${config.repo}/contents/database.json`;
                const response = await fetch(url, { headers: { 'Authorization': `token ${config.token}` } });
                
                if (response.ok) {
                    const data = await response.json();
                    currentSha = data.sha;
                    const parsed = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    
                    // Migrasi data jika struktur lama (array langsung)
                    if(Array.isArray(parsed)) {
                        dbState.docs = parsed;
                    } else {
                        dbState = parsed;
                    }
                    showToast('Data tersinkron');
                } else if (response.status === 404) {
                    dbState.docs = []; currentSha = null;
                }
                renderList();
                document.getElementById('sync-icon')?.classList.remove('animate-spin');
                return true;
            } catch (error) {
                document.getElementById('sync-icon')?.classList.remove('animate-spin');
                return false;
            }
        }

        async function saveDatabaseToGithub() {
            const config = getGithubConfig();
            if(!config.token) return false;

            const url = `https://api.github.com/repos/${config.username}/${config.repo}/contents/database.json`;
            const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(dbState, null, 2))));

            const bodyData = {
                message: `Update Database HT`,
                content: contentBase64,
                sha: currentSha || undefined
            };

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${config.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                if (response.ok) {
                    const data = await response.json();
                    currentSha = data.content.sha;
                    return true;
                }
            } catch (error) { return false; }
        }

        // Upload dengan XHR untuk menampilkan Progress Bar
        function uploadFileToGithubWithProgress(fileObj, folderName) {
            return new Promise((resolve, reject) => {
                const config = getGithubConfig();
                const fileNameLengkap = `${folderName}_${fileObj.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                const url = `https://api.github.com/repos/${config.username}/${config.repo}/contents/lampiran/${fileNameLengkap}`;

                const bodyData = JSON.stringify({ message: `Upload ${fileNameLengkap}`, content: fileObj.contentBase64 });

                const xhr = new XMLHttpRequest();
                xhr.open('PUT', url, true);
                xhr.setRequestHeader('Authorization', `token ${config.token}`);
                xhr.setRequestHeader('Content-Type', 'application/json');

                // Update Progress UI
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('upload-percent').innerText = `${percent}%`;
                        document.getElementById('upload-progress-bar').style.width = `${percent}%`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) resolve(fileNameLengkap);
                    else resolve(null); // Return null if failed, don't crash
                };
                xhr.onerror = () => resolve(null);
                xhr.send(bodyData);
            });
        }

        // Fungsi Kompresi Otomatis Gambar (Canvas) sebelum diconvert ke Base64
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; // max lebar untuk dokumen
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height = Math.round(height *= MAX_WIDTH / width);
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Compress jadi JPEG dengan kualitas 0.7 (Cukup jelas untuk baca dokumen)
                    const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    callback(base64, 'compressed_' + file.name.split('.')[0] + '.jpg');
                }
            }
        }

                if(isImage) {

        // --- MERGE PDF (GABUNGKAN BERKAS & PRINT) ---
        async function fetchFileBytesFromGithub(fileName) {
            const config = getGithubConfig();
            const url = `https://api.github.com/repos/${config.username}/${config.repo}/contents/lampiran/${fileName}`;
            const response = await fetch(url, { headers: { 'Authorization': `token ${config.token}` } });
            if(response.ok) {
                const data = await response.json();
                // Dekode Base64 ke Uint8Array untuk pdf-lib
                const binaryString = atob(data.content);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                return bytes;
            }
            return null;
        }

        async function mergeAndDownloadPDF(docId) {
            const doc = dbState.docs.find(d => d.id === docId);
            if(!doc || !doc.files || Object.keys(doc.files).length === 0) return showToast("Tidak ada lampiran untuk digabungkan!", "error");
            
            showToast("Memproses penggabungan PDF. Harap tunggu...", "info");
            try {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                for (const type of attachmentTypes) {
                    const fileName = doc.files[type.key];
                    if (fileName) {
                        showToast(`Mengambil ${type.label}...`, "info");
                        const bytes = await fetchFileBytesFromGithub(fileName);
                        if(bytes) {
                            if(fileName.toLowerCase().endsWith('.pdf')) {
                                const pdfToMerge = await PDFDocument.load(bytes);
                                const copiedPages = await mergedPdf.copyPages(pdfToMerge, pdfToMerge.getPageIndices());
                                copiedPages.forEach((page) => mergedPdf.addPage(page));
                            } else {
                                // Jika file berupa gambar (JPG/PNG), tempel ke halaman PDF baru
                                let img;
                                if(fileName.toLowerCase().includes('jpg') || fileName.toLowerCase().includes('jpeg')) {
                                    img = await mergedPdf.embedJpg(bytes);
                                } else {
                                    img = await mergedPdf.embedPng(bytes);
                                }
                                const page = mergedPdf.addPage([img.width, img.height]);
                                page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                            }
                        }
                    }
                }

                showToast("Menyimpan PDF Akhir...", "info");
                const mergedPdfFile = await mergedPdf.save();
                
                // Trigger Download ke komputer lokal
                const blob = new Blob([mergedPdfFile], { type: 'application/pdf' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `BERKAS_LENGKAP_${doc.namaDebitur.replace(/\s+/g,'_')}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                showToast("PDF Berhasil Diunduh!", "success");

            } catch (error) {
                console.error(error);
                showToast("Terjadi kesalahan saat menggabungkan PDF", "error");
            }
        }
